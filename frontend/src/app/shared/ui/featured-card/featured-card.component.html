<button
  class="featured-card"
  type="button"
  [class.featured-card--featured]="isFeatured()"
  [class.featured-card--active]="active()"
  [class.featured-card--hovered]="hoveredState()"
  (mouseenter)="hovered.emit()"
  (mouseleave)="unhovered.emit()"
  (focus)="hovered.emit()"
  (blur)="unhovered.emit()"
  (click)="selected.emit()"
>
  <div class="featured-card__meta">
    <span class="badge">{{ category() }}</span>
    <span class="region">{{ region() }}</span>
  </div>

  <h3>{{ title() }}</h3>
  <p>{{ description() }}</p>

  <div class="tags">
    <span class="tag" *ngFor="let tag of tags()">{{ tag }}</span>
  </div>
</button>
